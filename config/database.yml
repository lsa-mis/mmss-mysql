default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_0900_ai_ci
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # Reap dead connections instead of reusing them (avoids piling up aborted
  # connections on the server, which can trigger MySQL's max_connect_errors block).
  reaping_frequency: 10
  idle_timeout: 300
  checkout_timeout: 5
  # mysql2 socket-level timeouts so a stalled remote DB fails fast and cleanly
  # rather than leaving half-open connections.
  connect_timeout: 5
  read_timeout: 5
  write_timeout: 5
  username: root
  password: <%= ENV['LOCAL_MYSQL_DATABASE_PASSWORD'] %>

development:
  <<: *default
  database: mmss-mysql_development

test:
  <<: *default
  database: mmss-mysql_test

# Staging: use DATABASE_URL (e.g. Hatchbox / managed MySQL) or STAGING_DATABASE_* for a local socket/TCP DB.
staging:
<% if ENV["DATABASE_URL"].present? %>
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
<% else %>
  <<: *default
  database: <%= ENV.fetch("STAGING_DATABASE_NAME", "mmss_staging") %>
  username: <%= ENV.fetch("STAGING_DATABASE_USERNAME", "root") %>
  password: <%= ENV["STAGING_DATABASE_PASSWORD"] %>
  host: <%= ENV.fetch("STAGING_DATABASE_HOST", "127.0.0.1") %>
<% end %>

production:
  <<: *default
  # Puma runs `threads 4,16`, so each worker needs up to 16 connections.
  # Default of 5 starves the threads and churns connections. Override via
  # RAILS_MAX_THREADS if you change the Puma thread count.
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 16 } %>
  database: mmssprod
  username: <%= Rails.env.production? ? Rails.application.credentials.dig(:mysql, :prod_user) : ENV['MYSQL_PROD_USER'] %>
  password: <%= Rails.env.production? ? Rails.application.credentials.dig(:mysql, :prod_password) : ENV['MYSQL_PROD_PASSWORD'] %>
  host: <%= Rails.env.production? ? Rails.application.credentials.dig(:mysql, :prod_servername) : ENV['MYSQL_PROD_HOST'] %>
  sslca: <%= Rails.env.production? ? Rails.application.credentials.dig(:mysql, :prod_sslca) : ENV['MYSQL_PROD_SSLCA'] %>
